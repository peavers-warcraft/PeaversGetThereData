name: Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: peavers-code/peavers-warcraft-workflows/.github/workflows/release.yml@master
    with:
      toc_file: PeaversGetThereData.toc
      addon_name: PeaversGetThereData
      git_user_name: Chris Turner
      git_user_email: peavers@gmail.com
      use_self_hosted: true
    secrets: inherit
